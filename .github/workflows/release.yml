name: Build and publish release zip

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build the asset for (e.g. v3.0.42)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "::error::tag must match vX.Y.Z — got '$TAG'"; exit 1; }
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"     >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 1

      - name: Verify plugin version matches tag
        run: |
          HEADER=$(grep -m1 "^ \* Version:" shopwalk-for-woocommerce.php | sed 's/.*Version:[[:space:]]*//; s/[[:space:]].*//')
          STABLE=$(grep -m1 "^Stable tag:"   readme.txt          | sed 's/.*Stable tag:[[:space:]]*//; s/[[:space:]].*//')
          VERSION="${{ steps.tag.outputs.version }}"
          echo "tag=$VERSION  header=$HEADER  stable=$STABLE"
          [[ "$HEADER" == "$VERSION" && "$STABLE" == "$VERSION" ]] \
            || { echo "::error::tag/Version:/Stable tag: must all match"; exit 1; }

      - name: Assemble dist tree
        run: |
          SRC="$GITHUB_WORKSPACE"
          OUT="${RUNNER_TEMP}/dist/shopwalk-for-woocommerce"
          mkdir -p "$OUT"
          # Honour .distignore entries explicitly.
          rsync -a \
            --exclude='/.git/' \
            --exclude='/.github/' \
            --exclude='/tests/' \
            --exclude='/vendor/' \
            --exclude='/node_modules/' \
            --exclude='/.distignore' \
            --exclude='/.gitignore' \
            --exclude='/.editorconfig' \
            --exclude='/.phpcs.xml.dist' \
            --exclude='/phpunit.xml' \
            --exclude='/phpunit.xml.dist' \
            --exclude='/composer.json' \
            --exclude='/composer.lock' \
            --exclude='/package.json' \
            --exclude='/package-lock.json' \
            --include='readme.txt' \
            --exclude='*.md' \
            "$SRC"/ "$OUT"/

      - name: Build zip
        id: zip
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          cd "${RUNNER_TEMP}/dist"
          ZIP_NAME="shopwalk-for-woocommerce-${VERSION}.zip"
          # Top-level dir inside the zip stays slug-only (shopwalk-for-woocommerce/)
          # so manual installs land at wp-content/plugins/shopwalk-for-woocommerce/.
          # Only the zip filename carries the version.
          zip -rq "$ZIP_NAME" shopwalk-for-woocommerce/
          echo "path=${RUNNER_TEMP}/dist/${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          ls -la "$ZIP_NAME"

      - name: Upload to release (create if missing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          ASSET="${{ steps.zip.outputs.path }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "$ASSET" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Shopwalk for WooCommerce v${VERSION}" \
              --notes "Release from tag ${TAG}." \
              --latest
          fi
