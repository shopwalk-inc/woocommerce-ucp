name: phpcs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2, cs2pr

      - name: Install PHP_CodeSniffer + WordPress standards
        run: |
          # dealerdirect/phpcodesniffer-composer-installer is a Composer
          # plugin and Composer 2.2+ refuses to install plugins unless
          # they're explicitly allow-listed. Project composer.json allow-
          # lists it locally, but `composer global` uses ~/.composer
          # instead — allow-list it there too before installing.
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev \
            squizlabs/php_codesniffer:^3.10 \
            wp-coding-standards/wpcs:^3.1 \
            phpcompatibility/phpcompatibility-wp:^2.1 \
            dealerdirect/phpcodesniffer-composer-installer:^1.0
          echo "$HOME/.composer/vendor/bin" >> $GITHUB_PATH

      - name: Verify WordPress standard is installed
        run: phpcs -i

      - name: Run phpcs (project ruleset)
        run: |
          # Use the project's phpcs.xml (which extends WordPress + adds
          # the relaxations / capability allow-list documented in-file).
          # Don't pass --standard inline — phpcs auto-discovers phpcs.xml
          # in cwd, which is what we want.
          phpcs --report=checkstyle -q | cs2pr
